version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading_secret
      POSTGRES_DB: trading_competition
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trading -d trading_competition']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
